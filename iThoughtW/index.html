<!DOCTYPE html>
<html lang="zh-CN">
<!-- 
  ========================================================================================
  iThoughtW 开发更新日志 (Version Log)
  ========================================================================================
  v1.4: 实现动态文本高度计算、自动换行布局、基础快捷键 (Tab/Enter/Del) 及 LocalStorage 本地保存。
  v1.5: 增加节点克隆功能 (Clone)，引入基础节点拖拽重组逻辑。
  v1.6: 深度优化坐标系映射，实现精准的矩形碰撞检测拖拽；支持 Textarea 内回车换行 (Ctrl+Enter保存)。
  v1.7: 引入撤销/恢复系统 (Undo/Redo)，支持快捷键 Ctrl+Z / Ctrl+Y。
  v1.8: 增加 OPML 格式导入导出，实现与 iThoughts/XMind 等软件互通；支持 Markdown 导出。
  v1.9: 引入“彩虹分支” system。第一级节点自动循环分配红黄蓝绿紫五色，下级节点自动继承母节点颜色。
  v1.9-Adjust: 调整克隆为“复制+粘贴”模式。解决拖拽不便的问题，支持跨分支、跨层级的精准内容迁移。
  v2.0: 
    1) 增加自动保存至本地文件夹的配置功能：
       - 每当内容发生改变时，自动将导图保存为名为 "ithought_autosave.json" 的文件（直接覆盖）。
       - 传统的点击导出命名规则保持不变（带版本及日期命名，不覆盖）。
    2) 重新打开或刷新 HTML 页面时默认呈现“空白欢迎状态”，不再默认载入历史数据。用户可以通过一键“新建空白导图”或“导入旧导图”来进入工作区。
    3) 新增智能 JSON 导入净化与自愈算法（sanitizeData），深度防止在导入历史或格式缺失的 JSON 时页面发生白屏崩溃。
    4) 修复了 React 18 挂载函数导致的启动即白屏崩溃的严重错误，恢复为标准的 `<App />` 格式。
    5) 修复了自动保存中未在整点静默备份为 CSV 的问题，新增整点时间检测器实现静默覆盖保存为 "ithought_autosave.csv"。
    6) 修复了分支折叠后展开按钮因布局子数组置空而消失的 Bug，恢复折叠后右侧稳定的加号展开交互。
    7) 增加拖动保护：支持 Esc 键、点击空白区域一键取消节点悬浮/拖动状态。
  v3.0:
    1) 手机移动端自适应升级，按钮、工具栏在不同屏宽下自适应包裹重组，支持指尖轻松点按（尺寸全规格不低于44px）。
    2) 画布新增移动端专属事件监听，支持单指触摸滑动平移画布、双指捏合缩放（Pinch-to-Zoom）。
    3) 新建或载入导图时自动计算容器视口，智能居中对齐当前所有内容，手机打开不迷失。
    4) 新增右侧悬浮触屏操控台（包含放大、缩小、一键居中复位），单手掌控全局。
  v3.0-Heal: 解决并优化了导入 JSON 数据时，由于数据格式微小冲突导致 React 渲染层崩溃致使页面全白屏的问题，统一状态同步更新入口。
  ========================================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iThoughtW3.0 - 网页思维导图工具</title>
    <!-- 加载基础依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            touch-action: none; /* 禁用系统默认缩放以全面托管 */
        }
        #measure-container {
            position: absolute;
            visibility: hidden;
            height: auto;
            width: 160px; /* NODE_WIDTH - padding */
            font-size: 14px;
            line-height: 1.25rem;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 8px;
        }
        .drag-ghost { opacity: 0.4; pointer-events: none; }
        .drop-target-hint {
            stroke-width: 2px !important;

</head>
<body class="bg-slate-50 overflow-hidden no-select">
    <div id="measure-container"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 五色调色盘
        const COLOR_PALETTE = [
            '#ef4444', // 红
            '#f59e0b', // 黄
            '#3b82f6', // 蓝
            '#10b981', // 绿
            '#8b5cf6'  // 紫
        ];

        // --- IndexedDB 辅助函数（用于持久化保存本地文件夹句柄） ---
        const getDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open("iThoughtW_Storage", 1);
            request.onupgradeneeded = (e) => {
                e.target.result.createObjectStore("settings");
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });

        const getDBSetting = async (key) => {
            try {
                const db = await getDB();
                return new Promise((resolve) => {
                    const tx = db.transaction("settings", "readonly");
                    const req = tx.objectStore("settings").get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });
            } catch (e) {
                return null;
            }
        };

        const setDBSetting = async (key, val) => {
            try {
                const db = await getDB();
                return new Promise((resolve) => {
                    const tx = db.transaction("settings", "readwrite");
                    const req = tx.objectStore("settings").put(val, key);
                    req.onsuccess = () => resolve();
                    req.onerror = () => resolve();
                });
            } catch (e) {}
        };

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                minus: <path d="M5 12h14" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3" />,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M17 8l-5-5-5 5M12 3v12" />,
                spreadsheet: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />,
                copy: <path d="M8 17.7c0 .7.6 1.3 1.3 1.3h8.4c.7 0 1.3-.6 1.3-1.3V9.3c0-.7-.6-1.3-1.3-1.3h-8.4C8.6 8 8 8.6 8 9.3v8.4z M16 8V4.3c0-.7-.6-1.3-1.3-1.3H6.3C5.6 3 5 3.6 5 4.3v8.4c0 .7.6 1.3 1.3 1.3H8" />,
                paste: <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 2h6v4H9z" />,
                up: <path d="m18 15-6-6-6 6" />,
                down: <path d="m6 9 6 6 6-6" />,
                undo: <path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />,
                redo: <path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7" />,
                fold: <path d="M12 22v-5M9 19l3-3 3 3M12 2v5M9 5l3 3 3-3M4 12h16" />,
                folder: <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />,
                folderOpen: <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2zM2 10h20" />,
                palette: (
                    <>
                        <path d="M12 2.69l.62 1.15c.15.28.43.46.75.48a10 10 0 0 1 8.86 11.23c-.3 2.05-1.58 3.8-3.41 4.71-1.84.9-3.95.89-5.7-.04l-1.12-.61c-.32-.17-.7-.17-1.02 0l-1.12.61c-1.75.93-3.86.94-5.7.04-1.83-.91-3.11-2.66-3.41-4.71A10 10 0 0 1 9.63 4.32c.32-.02.6-.2.75-.48l.62-1.15c.2-.38.8-.38 1 0z" />
                        <circle cx="12" cy="13" r="2" />
                    </>
                ),
                fileText: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                    </>
                ),
                share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" />,
                importOpml: <path d="M12 2v13m0 0l-3-3m3 3l3-3M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />,
                image: (
                    <g fill="none" stroke="currentColor" strokeWidth="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" />
                    </g>
                ),
                settings: <circle cx="12" cy="12" r="3" />,
                maximize: <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronDown: <polyline points="6 9 12 15 18 9" />,
                save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />,
                info: (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4M12 8h.01" />
                    </>
                ),
                close: <path d="M18 6L6 18M6 6l12 12" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const VERSION = "iThoughtW3.0";
        const NODE_WIDTH = 180;
        const MIN_NODE_HEIGHT = 42;
        const LEVEL_GAP = 240;
        const SIBLING_GAP = 24;

        const measureTextHeight = (text) => {
            const el = document.getElementById('measure-container');
            if (!el) return MIN_NODE_HEIGHT;
            el.innerText = text || " ";
            return Math.max(MIN_NODE_HEIGHT, el.offsetHeight + 18);
        };

        // --- 核心自愈与安全过滤函数（全面自愈，防止各类脏数据崩溃） ---
        const sanitizeData = (rawJson) => {
            let cleanedJson = rawJson;
            // 兼容处理最外层被包装为 Array 的结构 (部分第三方备份形式)
            if (Array.isArray(cleanedJson)) {
                cleanedJson = cleanedJson[0];
            }
            // 兼容处理把真实内容塞入 data 核心键的结构
            if (cleanedJson && cleanedJson.data && typeof cleanedJson.data === 'object') {
                cleanedJson = cleanedJson.data;
            }

            if (!cleanedJson || typeof cleanedJson !== 'object') {
                return { id: 'root', text: '中心主题', children: [], collapsed: false, color: '#334155' };
            }

            const sanitizeNode = (node, parentColor = null, isFirstLevel = false, index = 0) => {
                if (!node || typeof node !== 'object') {
                    return { id: `n_${Math.random().toString(36).substr(2, 9)}_${Date.now()}`, text: '新话题', children: [], collapsed: false, color: parentColor || '#334155' };
                }
                
                // 强制转为 String，防止在 ID 检索定位时发生 Type-Mismatch (如 number 和 string 混用)
                const id = node.id ? String(node.id) : `n_${Math.random().toString(36).substr(2, 9)}_${Date.now()}`;
                
                // 强制将 text 转化为 String（如数字 123 转化为 "123"），确保 replace 等属性稳定可用
                const text = node.text !== undefined && node.text !== null ? String(node.text) : '新话题';
                const collapsed = !!node.collapsed;
                
                let color = node.color;
                if (isFirstLevel) {
                    color = color || COLOR_PALETTE[index % COLOR_PALETTE.length];
                } else if (parentColor) {
                    color = parentColor;
                } else {
                    color = color || '#334155';
                }

                const rawChildren = Array.isArray(node.children) ? node.children : [];
                const children = rawChildren.map((child, i) => sanitizeNode(child, color, false, i));

                return { id, text, children, collapsed, color };
            };

            const rootText = cleanedJson.text !== undefined && cleanedJson.text !== null ? String(cleanedJson.text) : '中心主题';
            const rootCollapsed = !!cleanedJson.collapsed;
            const rootColor = cleanedJson.color || '#334155';
            const rootChildren = Array.isArray(cleanedJson.children) ? cleanedJson.children : [];
            
            const sanitizedChildren = rootChildren.map((child, i) => 
                sanitizeNode(child, null, true, i)
            );

            return {
                id: 'root', // 强制确立根节点 ID 为 root
                text: rootText,
                collapsed: rootCollapsed,
                color: rootColor,
                children: sanitizedChildren
            };
        };

        function App() {
            // data === null 代表空白欢迎主页，非null进入工作流
            const [data, setDataState] = useState(null);

            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(0);

            // 复制粘贴板
            const [clipboard, setClipboard] = useState(null);

            // 自动保存至本地配置
            const [dirHandle, setDirHandle] = useState(null);
            const [folderPermission, setFolderPermission] = useState('prompt');
            const [folderSaveStatus, setFolderSaveStatus] = useState('未设置自动保存目录');
            const isLocalSaveSupported = typeof window.showDirectoryPicker !== "undefined";

            // 统一的状态同步与历史安全管理路径 (解决导入和普通修改的并行时序问题)
            const setData = (newData, skipHistory = false) => {
                setDataState(newData);
                if (!skipHistory) {
                    const newHistory = history.slice(0, historyIndex + 1);
                    newHistory.push(newData);
                    if (newHistory.length > 50) newHistory.shift();
                    setHistory(newHistory);
                    setHistoryIndex(newHistory.length - 1);
                }
            };

            const undo = () => { if (historyIndex > 0) { const idx = historyIndex - 1; setHistoryIndex(idx); setDataState(history[idx]); } };
            const redo = () => { if (historyIndex < history.length - 1) { const idx = historyIndex + 1; setHistoryIndex(idx); setDataState(history[idx]); } };

            const [selectedId, setSelectedId] = useState('root');
            const [editingId, setEditingId] = useState(null);
            const [scale, setScale] = useState(1.0);
            const [translate, setTranslate] = useState({ x: 150, y: window.innerHeight / 2 });
            const [saveStatus, setSaveStatus] = useState('空白页面');
            const [dragInfo, setDragInfo] = useState({ isDragging: false, draggingId: null, dx: 0, dy: 0, targetId: null });
            const svgRef = useRef(null);

            // 智能居中逻辑：新建/导入完成或视口重置时自动执行
            const handleFitView = () => {
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                // 对于小屏幕（手机），给予更贴近中央偏左的初始焦距
                if (screenWidth < 768) {
                    setTranslate({ x: screenWidth / 3, y: screenHeight / 2 });
                    setScale(0.8);
                } else {
                    setTranslate({ x: screenWidth / 4, y: screenHeight / 2 });
                    setScale(1.0);
                }
            };

            // 载入目录
            useEffect(() => {
                getDBSetting("dirHandle").then(async (handle) => {
                    if (handle) {
                        setDirHandle(handle);
                        try {
                            const status = await handle.queryPermission({ mode: 'readwrite' });
                            setFolderPermission(status);
                            if (status === 'granted') {
                                setFolderSaveStatus('自动保存：目录就绪');
                            } else {
                                setFolderSaveStatus('自动保存：待重新授权');
                            }
                        } catch (err) {
                            setFolderSaveStatus('自动保存：初始化失败');
                        }
                    }
                });
            }, []);

            // 静默自动保存 ithought_autosave.json
            const performFolderSave = async (currentData) => {
                if (!dirHandle || !currentData) return;
                try {
                    const jsonFileHandle = await dirHandle.getFileHandle("ithought_autosave.json", { create: true });
                    const jsonWritable = await jsonFileHandle.createWritable();
                    await jsonWritable.write(JSON.stringify(currentData, null, 2));
                    await jsonWritable.close();
                    setFolderSaveStatus('本地自动保存成功 (JSON已更新)');
                } catch (err) {
                    console.error("Auto-save failed:", err);
                    setFolderSaveStatus('本地自动保存失败 (权限受限或已被移动)');
                }
            };

            useEffect(() => {
                if (!dirHandle || !data || data.id === 'empty') return;

                const checkAndSaveCSV = async () => {
                    try {
                        const lastCsvSaveStr = localStorage.getItem('ithought_last_csv_save') || '0';
                        const lastCsvSave = parseInt(lastCsvSaveStr, 10);
                        const now = Date.now();

                        const lastSaveHour = Math.floor(lastCsvSave / 3600000);
                        const currentHour = Math.floor(now / 3600000);

                        // 跨越整点小时数时，自动静默生成 CSV
                        if (currentHour !== lastSaveHour) {
                            const rows = [];
                            const walk = (n, p = "无", l = 0) => {
                                rows.push(`${l},"${n.text.replace(/"/g, '""').replace(/\n/g, ' ')}","${p.replace(/"/g, '""')}"`);
                                const children = n.children || [];
                                children.forEach(c => walk(c, n.text, l + 1));
                            };
                            walk(data);
                            const csvContent = "\uFEFF层级,内容,父级\n" + rows.join("\n");

                            const csvFileHandle = await dirHandle.getFileHandle("ithought_autosave.csv", { create: true });
                            const csvWritable = await csvFileHandle.createWritable();
                            await csvWritable.write(csvContent);
                            await csvWritable.close();

                            localStorage.setItem('ithought_last_csv_save', now.toString());
                            setFolderSaveStatus('整点自动归档成功 (ithought_autosave.csv已替换)');
                        }
                    } catch (err) {
                        console.error("Hourly CSV save failed:", err);
                    }
                };

                const intervalId = setInterval(checkAndSaveCSV, 10000);
                return () => clearInterval(intervalId);
            }, [data, dirHandle]);

            useEffect(() => {
                if (!data || data.id === 'empty') return;
                setSaveStatus('变更未保存');
                
                const debounceTimer = setTimeout(() => {
                    if (folderPermission === 'granted') {
                        performFolderSave(data);
                    }
                    setSaveStatus('修改已保存');
                }, 1000);

                return () => clearTimeout(debounceTimer);
            }, [data, dirHandle, folderPermission]);

            const requestFolderPermission = async () => {
                if (!dirHandle) return;
                try {
                    const status = await dirHandle.requestPermission({ mode: 'readwrite' });
                    setFolderPermission(status);
                    if (status === 'granted') {
                        setFolderSaveStatus('已重新获得保存目录授权');
                        if (data) performFolderSave(data);
                    }
                } catch (e) {
                    setFolderSaveStatus('重新授权失败');
                }
            };

            const selectAutosaveDirectory = async () => {
                try {
                    const handle = await window.showDirectoryPicker();
                    await setDBSetting("dirHandle", handle);
                    setDirHandle(handle);
                    setFolderPermission('granted');
                    setFolderSaveStatus('文件夹配置成功');
                    if (data) performFolderSave(data);
                } catch (err) {
                    setFolderSaveStatus('文件夹选择已取消');
                }
            };

            const handleCreateNewMap = () => {
                const initialMap = {
                    id: 'root', text: '中心主题', children: [], collapsed: false, color: '#334155'
                };
                setData(initialMap);
                setSelectedId('root');
                setEditingId(null);
                localStorage.setItem('ithought_last_csv_save', Date.now().toString());
                
                // 延时渲染周期，确保视口宽度高度渲染就绪后居中
                setTimeout(handleFitView, 50);
            };

            // --- 查找与变色工具函数 ---
            const findNodeById = (node, id) => {
                if (!node) return null;
                if (node.id === id) return node;
                const children = node.children || [];
                for (let child of children) {
                    const res = findNodeById(child, id);
                    if (res) return res;
                }
                return null;
            };

            const findParentId = (node, childId) => {
                if (!node) return null;
                const children = node.children || [];
                if (children.some(c => c.id === childId)) return node.id;
                for (let child of children) {
                    const res = findParentId(child, childId);
                    if (res) return res;
                }
                return null;
            };

            const isDescendant = (parentNode, childId) => {
                if (!parentNode) return false;
                const children = parentNode.children || [];
                for (let child of children) {
                    if (child.id === childId) return true;
                    if (isDescendant(child, childId)) return true;
                }
                return false;
            };

            const updateSubtreeColor = (node, color) => ({
                ...node,
                color,
                children: (node.children || []).map(c => updateSubtreeColor(c, color))
            });

            const deepCloneNode = (node, newParentColor = null, isToRoot = false, index = 0) => {
                const newId = `n_${Math.random().toString(36).substr(2, 9)}_${Date.now()}`;
                let newColor = newParentColor;
                if (isToRoot) {
                    newColor = COLOR_PALETTE[index % COLOR_PALETTE.length];
                }
                return {
                    ...node,
                    id: newId,
                    color: newColor,
                    children: (node.children || []).map((c, i) => deepCloneNode(c, newColor, false, i))
                };
            };

            // --- 节点复制粘贴 ---
            const handleCopy = () => {
                const target = findNodeById(data, selectedId);
                if (!target || selectedId === 'root') return;
                setClipboard(target);
                setSaveStatus('已复制');
                setTimeout(() => setSaveStatus('已保存'), 2000);
            };

            const handlePaste = () => {
                if (!clipboard) return;
                const targetParent = findNodeById(data, selectedId);
                if (!targetParent) return;

                const isToRoot = selectedId === 'root';
                const nextIndex = (targetParent.children || []).length;
                const newSubtree = deepCloneNode(clipboard, targetParent.color, isToRoot, nextIndex);

                const update = (node) => {
                    if (node.id === selectedId) return { ...node, collapsed: false, children: [...(node.children || []), newSubtree] };
                    return { ...node, children: (node.children || []).map(update) };
                };
                
                setData(update(data));
                setSelectedId(newSubtree.id);
                setSaveStatus('已粘贴');
            };

            const addChild = (parentId) => {
                const parent = findNodeById(data, parentId);
                if (!parent) return;
                const newId = `n_${Date.now()}`;
                
                let newNodeColor;
                if (parentId === 'root') {
                    newNodeColor = COLOR_PALETTE[(parent.children || []).length % 5];
                } else {
                    newNodeColor = parent.color || '#334155';
                }

                const newNode = { id: newId, text: '新话题', children: [], collapsed: false, color: newNodeColor };
                const update = (node) => {
                    if (node.id === parentId) return { ...node, collapsed: false, children: [...(node.children || []), newNode] };
                    return { ...node, children: (node.children || []).map(update) };
                };
                setData(update(data));
                setSelectedId(newId);
                setEditingId(newId);
            };

            const changeBranchColor = (id) => {
                const node = findNodeById(data, id);
                if (!node || id === 'root') return;
                const parentId = findParentId(data, id);
                if (parentId !== 'root') return; 

                const currIdx = COLOR_PALETTE.indexOf(node.color);
                const nextColor = COLOR_PALETTE[(currIdx + 1) % COLOR_PALETTE.length];
                const update = (n) => n.id === id ? updateSubtreeColor(n, nextColor) : { ...n, children: (n.children || []).map(update) };
                setData(update(data));
            };

            const reparentNode = (nodeId, newParentId) => {
                if (nodeId === newParentId || nodeId === 'root') return;
                const nodeToMove = findNodeById(data, nodeId);
                if (!nodeToMove || isDescendant(nodeToMove, newParentId)) return;

                const newParent = findNodeById(data, newParentId);
                let newBranchColor;
                if (newParentId === 'root') {
                    newBranchColor = COLOR_PALETTE[(newParent.children || []).length % 5];
                } else {
                    newBranchColor = newParent.color;
                }

                const updatedNode = updateSubtreeColor(nodeToMove, newBranchColor);
                const remove = (node) => ({ ...node, children: (node.children || []).filter(c => c.id !== nodeId).map(remove) });
                const stripped = remove(data);
                const add = (node) => {
                    if (node.id === newParentId) return { ...node, children: [...(node.children || []), updatedNode], collapsed: false };
                    return { ...node, children: (node.children || []).map(add) };
                };
                setData(add(stripped));
            };

            const moveSibling = (id, direction) => {
                if (id === 'root') return;
                const pId = findParentId(data, id);
                if (!pId) return;
                const update = (node) => {
                    if (node.id === pId) {
                        const children = node.children || [];
                        const idx = children.findIndex(c => c.id === id);
                        const nIdx = idx + direction;
                        if (nIdx < 0 || nIdx >= children.length) return node;
                        const newC = [...children]; [newC[idx], newC[nIdx]] = [newC[nIdx], newC[idx]];
                        return { ...node, children: newC };
                    }
                    return { ...node, children: (node.children || []).map(update) };
                };
                setData(update(data));
            };

            const handleTouchStart = (e) => {
                if (e.target.tagName === 'svg' || e.target.tagName === 'rect' || e.target.tagName === 'g') {
                    if (e.touches.length === 1) {
                        // 移动端单指滑动平移画布
                        if (e.target.tagName !== 'svg') return; // 如果点在节点上则不拖拽画布
                        const touch = e.touches[0];
                        const sx = touch.clientX - translate.x;
                        const sy = touch.clientY - translate.y;
                        
                        const handleTouchMove = (ev) => {
                            if (ev.touches.length === 1) {
                                const t = ev.touches[0];
                                setTranslate({ x: t.clientX - sx, y: t.clientY - sy });
                            }
                        };
                        const handleTouchEnd = () => {
                            window.removeEventListener('touchmove', handleTouchMove);
                            window.removeEventListener('touchend', handleTouchEnd);
                        };
                        window.addEventListener('touchmove', handleTouchMove, { passive: false });
                        window.addEventListener('touchend', handleTouchEnd);
                    } else if (e.touches.length === 2) {
                        // 移动端双指捏合自由调节缩放 (Pinch to Zoom)
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const initialDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        const initialScale = scale;
                        
                        const handleTouchMove = (ev) => {
                            if (ev.touches.length === 2) {
                                ev.preventDefault(); // 阻止浏览器原生两指缩放
                                const nt1 = ev.touches[0];
                                const nt2 = ev.touches[1];
                                const dist = Math.hypot(nt1.clientX - nt2.clientX, nt1.clientY - nt2.clientY);
                                const factor = dist / initialDist;
                                setScale(Math.min(Math.max(initialScale * factor, 0.15), 3.0));
                            }
                        };
                        const handleTouchEnd = () => {
                            window.removeEventListener('touchmove', handleTouchMove);
                            window.removeEventListener('touchend', handleTouchEnd);
                        };
                        window.addEventListener('touchmove', handleTouchMove, { passive: false });
                        window.addEventListener('touchend', handleTouchEnd);
                    }
                }
            };

            // 移动端单指点击/触控节点拖拽支持
            const handleTouchStartNode = (e, id) => {
                e.stopPropagation();
                setSelectedId(id);
                if (id === 'root' || editingId) return;
                
                const touch = e.touches[0];
                const startX = touch.clientX, startY = touch.clientY;
                let moved = false;
                
                const onTouchMove = (mv) => {
                    if (mv.touches.length > 1) return;
                    const t = mv.touches[0];
                    const dx = (t.clientX - startX) / scale;
                    const dy = (t.clientY - startY) / scale;
                    if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
                    if (moved) {
                        const pt = svgRef.current.createSVGPoint(); pt.x = t.clientX; pt.y = t.clientY;
                        const local = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
                        const hitTest = (nodes) => {
                            for (let n of nodes) {
                                const hitW = 100, hitH = n.height / 2 + 10;
                                if (local.x >= n.x - hitW && local.x <= n.x + hitW && local.y >= n.y - hitH && local.y <= n.y + hitH) {
                                    if (n.id !== id) return n.id;
                                }
                                const res = hitTest(n.children || []); if (res) return res;
                            }
                            return null;
                        };
                        setDragInfo({ isDragging: true, draggingId: id, dx, dy, targetId: hitTest([layout]) });
                    }
                };
                
                const onTouchEnd = () => {
                    setDragInfo(prev => { 
                        if (prev.isDragging && prev.targetId) reparentNode(prev.draggingId, prev.targetId); 
                        return { isDragging: false, draggingId: null, dx: 0, dy: 0, targetId: null }; 
                    });
                    window.removeEventListener('touchmove', onTouchMove);
                    window.removeEventListener('touchend', onTouchEnd);
                };
                
                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchend', onTouchEnd);
            };

            const collapseAll = () => {
                const recursiveCollapse = (node) => ({ ...node, collapsed: (node.children || []).length > 0, children: (node.children || []).map(recursiveCollapse) });
                setData(recursiveCollapse(data));
            };

            // OPML 导入 (带净化算法自愈)
            const handleImportOPMLFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const xml = new DOMParser().parseFromString(ev.target.result, "text/xml");
                        const outlines = xml.querySelectorAll("body > outline");
                        if (outlines.length === 0) throw new Error("无效的 OPML 格式");

                        const parse = (el, pColor, isFirstLevel, idx) => {
                            const myColor = isFirstLevel ? COLOR_PALETTE[idx % 5] : pColor;
                            return { id: `n_${Math.random().toString(36).substr(2, 9)}`, text: el.getAttribute("text") || "内容", color: myColor, children: Array.from(el.children).filter(c => c.tagName.toLowerCase() === "outline").map((c, i) => parse(c, myColor, false, i)), collapsed: false };
                        };
                        const roots = Array.from(outlines).map((o, i) => parse(o, null, true, i));
                        const importedData = { id: 'root', text: '导入的主题', children: roots, color: '#334155' };
                        
                        const sanitized = sanitizeData(importedData);
                        setData(sanitized);
                        setSelectedId('root');
                        localStorage.setItem('ithought_last_csv_save', Date.now().toString());
                        setTimeout(handleFitView, 50);
                    } catch(err) { setSaveStatus('导入失败'); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleImportJSONFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        const sanitized = sanitizeData(json);
                        setData(sanitized); // 统一状态，防止 history 丢包
                        setSelectedId('root');
                        localStorage.setItem('ithought_last_csv_save', Date.now().toString());
                        setTimeout(handleFitView, 50); // 导入后自动居中呈现
                    } catch(err) { setSaveStatus('无效的 JSON'); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleExportOPML = () => {
                const escape = (str) => str.replace(/[<>&"']/g, (c) => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
                const nodeToOPML = (node) => {
                    let xml = `<outline text="${escape(node.text)}">`;
                    const children = node.children || [];
                    children.forEach(c => xml += nodeToOPML(c));
                    xml += `</outline>`;
                    return xml;
                };
                const opml = `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="2.0">\n<head><title>${VERSION} Map</title></head>\n<body>\n${nodeToOPML(data)}\n</body>\n</opml>`;
                const blob = new Blob([opml], { type: 'text/xml' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${VERSION}_Export_${new Date().toISOString().split('T')[0]}.opml`; a.click();
            };

            const handleExportMarkdown = () => {
                const nodeToMD = (node, level = 0) => {
                    let md = "  ".repeat(level) + "- " + node.text.replace(/\n/g, ' ') + "\n";
                    const children = node.children || [];
                    children.forEach(c => md += nodeToMD(c, level + 1));
                    return md;
                };
                const blob = new Blob([nodeToMD(data)], { type: 'text/markdown' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${VERSION}_Export_${new Date().toISOString().split('T')[0]}.md`; a.click();
            };

            const handleExportJSON = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })); a.download = `${VERSION}_${new Date().toISOString().split('T')[0]}.json`; a.click();
            };

            const handleDownloadImage = () => {
                const svg = svgRef.current; const bbox = svg.getBBox(); const pad = 60;
                const clone = svg.cloneNode(true); clone.setAttribute('viewBox', `${bbox.x - pad} ${bbox.y - pad} ${bbox.width + pad * 2} ${bbox.height + pad * 2}`);
                const img = new Image(); img.onload = () => {
                    const canv = document.createElement('canvas'); canv.width = (bbox.width + pad * 2) * 2; canv.height = (bbox.height + pad * 2) * 2;
                    const ctx = canv.getContext('2d'); ctx.fillStyle = "white"; ctx.fillRect(0, 0, canv.width, canv.height); ctx.drawImage(img, 0, 0, canv.width, canv.height);
                    const a = document.createElement("a"); a.href = canv.toDataURL("image/png"); a.download = `${VERSION}_Export_${Date.now()}.png`; a.click();
                };
                img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(new XMLSerializer().serializeToString(clone));
            };

            // 布局计算
            const getSubtreeHeight = (node) => {
                if (!node) return 0;
                const selfH = measureTextHeight(node.text);
                const children = node.children || [];
                if (node.collapsed || children.length === 0) return selfH;
                return Math.max(selfH, children.reduce((a, c) => a + getSubtreeHeight(c), 0) + (children.length - 1) * SIBLING_GAP);
            };

            const calculateLayout = (node, x, y) => {
                if (!node) return null;
                const selfH = measureTextHeight(node.text);
                const subH = getSubtreeHeight(node);
                const childrenPos = [];
                const children = node.children || [];
                if (!node.collapsed && children.length > 0) {
                    let curY = y - subH / 2;
                    children.forEach(c => {
                        const cH = getSubtreeHeight(c);
                        childrenPos.push(calculateLayout(c, x + LEVEL_GAP, curY + cH / 2));
                        curY += cH + SIBLING_GAP;
                    });
                }
                return { ...node, x, y, height: selfH, children: childrenPos };
            };

            const layout = useMemo(() => {
                if (!data) return null;
                return calculateLayout(data, 0, 0);
            }, [data]);

            // --- 交互处理 (支持 mouse 及 touch) ---
            const renderTree = (nodePos) => {
                if (!nodePos) return null;
                const isS = selectedId === nodePos.id, isE = editingId === nodePos.id;
                const isDrag = dragInfo.draggingId === nodePos.id, isTarget = dragInfo.targetId === nodePos.id;
                const posX = isDrag ? nodePos.x + dragInfo.dx : nodePos.x, posY = isDrag ? nodePos.y + dragInfo.dy : nodePos.y;
                const branchColor = nodePos.color || '#334155';
                const children = nodePos.children || [];
                
                const rawNode = findNodeById(data, nodePos.id);
                const hasChildren = rawNode && rawNode.children && rawNode.children.length > 0;

                return (
                    <React.Fragment key={nodePos.id}>
                        {!isDrag && children.map(child => (
                            <path key={`l-${child.id}`} d={`M ${nodePos.x + 90} ${nodePos.y} C ${nodePos.x + 150} ${nodePos.y}, ${child.x - 150} ${child.y}, ${child.x - 90} ${child.y}`} fill="none" stroke={child.color || '#cbd5e1'} strokeWidth="2.5" opacity="0.6" />
                        ))}
                        <g transform={`translate(${posX - 90}, ${posY - nodePos.height / 2})`} className={isDrag ? 'drag-ghost' : ''}>
                            <rect width={180} height={nodePos.height} rx="12" fill={isS ? branchColor : '#ffffff'} stroke={isS ? branchColor : (isTarget ? '#3b82f6' : branchColor)} strokeWidth={isS ? 0 : 2} className={`cursor-grab active:cursor-grabbing transition-all shadow-sm ${isTarget ? 'drop-target-hint' : ''}`} onMouseDown={(e) => handleMouseDown(e, nodePos.id)} onTouchStart={(e) => handleTouchStartNode(e, nodePos.id)} onDoubleClick={(e) => { e.stopPropagation(); setEditingId(nodePos.id); }} />
                            <foreignObject width={180} height={nodePos.height} style={{ pointerEvents: isE ? 'auto' : 'none' }}>
                                <div className="w-full h-full flex items-center justify-center p-2 text-center">
                                    {isE ? (
                                        <textarea autoFocus className={`w-full h-full bg-transparent outline-none text-sm resize-none overflow-hidden font-sans text-center ${isS ? 'text-white' : 'text-slate-700'}`} defaultValue={nodePos.text} onBlur={(e) => { const val = e.target.value; const upd = (n) => n.id === nodePos.id ? { ...n, text: val } : { ...n, children: (n.children || []).map(upd) }; setData(upd(data)); setEditingId(null); }} onKeyDown={(e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) e.target.blur(); }} />
                                    ) : <div className={`text-sm break-words w-full font-medium ${isS ? 'text-white' : 'text-slate-700'}`} style={{ whiteSpace: 'pre-wrap' }}>{nodePos.text}</div>}
                                </div>
                            </foreignObject>
                            {hasChildren && (
                                <g transform={`translate(180, ${nodePos.height / 2})`} onClick={(e) => { e.stopPropagation(); const upd = (n) => n.id === nodePos.id ? { ...n, collapsed: !n.collapsed } : { ...n, children: (n.children || []).map(upd) }; setData(upd(data)); }} className="cursor-pointer">
                                    <circle r="9" fill="white" stroke={branchColor} strokeWidth="1.5" />
                                    <g transform={`translate(-5, -5)`}><Icon name={nodePos.collapsed ? 'plus' : 'chevronDown'} size={10} style={{ color: branchColor }} /></g>
                                </g>
                            )}
                        </g>
                        {!nodePos.collapsed && children.map(child => renderTree(child))}
                    </React.Fragment>
                );
            };

            // 键盘快捷键监听
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setDragInfo({ isDragging: false, draggingId: null, dx: 0, dy: 0, targetId: null });
                        if (editingId) setEditingId(null);
                        return;
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') { if(!editingId) { e.preventDefault(); handleCopy(); } }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') { if(!editingId) { e.preventDefault(); handlePaste(); } }
                    
                    if (editingId || !data) return;
                    
                    if (e.key === 'Tab') { e.preventDefault(); addChild(selectedId); }
                    else if (e.key === 'Enter') { e.preventDefault(); if (selectedId !== 'root') moveSibling(selectedId, 1); addChild(findParentId(data, selectedId)); }
                    else if (e.key === 'Backspace' || e.key === 'Delete') { if (selectedId !== 'root') { const upd = (n) => ({ ...n, children: (n.children || []).filter(c => c.id !== selectedId).map(upd) }); setData(upd(data)); setSelectedId('root'); } }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedId, editingId, data, historyIndex, clipboard]);

            // --- 渲染欢迎页面 (自适应 Onboarding 引导卡片) ---
            if (!data) {
                return (
                    <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-50 overflow-auto px-4 py-8">
                        <div className="max-w-2xl w-full text-center space-y-8">
                            {/* Logo */}
                            <div className="flex flex-col items-center space-y-3">
                                <div className="bg-slate-800 p-4 rounded-3xl text-white shadow-lg animate-pulse">
                                    <Icon name="settings" size={48} />
                                </div>
                                <h1 className="font-extrabold text-3xl sm:text-4xl tracking-tight text-slate-800">
                                    {VERSION}
                                </h1>
                                <p className="text-xs sm:text-sm text-slate-400 max-w-md px-2">
                                    支持触屏手势缩放与拖拽、专业本地静默同步的轻量脑图，开箱即用。
                                </p>
                            </div>

                            {/* 欢迎引导卡片组 */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6 text-left px-2">
                                <div onClick={handleCreateNewMap} className="bg-white p-5 rounded-2xl border border-slate-200 hover:border-blue-500 shadow-sm hover:shadow-md cursor-pointer transition-all flex flex-col justify-between group">
                                    <div className="space-y-2">
                                        <div className="p-3 bg-blue-50 text-blue-600 rounded-xl w-fit group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                            <Icon name="plus" size={24} />
                                        </div>
                                        <h3 className="font-bold text-base sm:text-lg text-slate-800">新建导图</h3>
                                        <p className="text-[11px] sm:text-xs text-slate-400">开启全新空白画布，设计规划您的创意方案。</p>
                                    </div>
                                    <span className="text-blue-600 font-semibold text-xs mt-4 inline-flex items-center gap-1 group-hover:translate-x-1 transition-transform">立即新建 →</span>
                                </div>

                                <label className="bg-white p-5 rounded-2xl border border-slate-200 hover:border-emerald-500 shadow-sm hover:shadow-md cursor-pointer transition-all flex flex-col justify-between group">
                                    <input type="file" className="hidden" accept=".opml" onChange={handleImportOPMLFile} />
                                    <div className="space-y-2">
                                        <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl w-fit group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                                            <Icon name="importOpml" size={24} />
                                        </div>
                                        <h3 className="font-bold text-base sm:text-lg text-slate-800">导入 OPML</h3>
                                        <p className="text-[11px] sm:text-xs text-slate-400">一键快速读取 XMind、iThoughts、MindNode 导出的互通格式。</p>
                                    </div>
                                    <span className="text-emerald-600 font-semibold text-xs mt-4 inline-flex items-center gap-1 group-hover:translate-x-1 transition-transform">导入 OPML →</span>
                                </label>

                                <label className="bg-white p-5 rounded-2xl border border-slate-200 hover:border-indigo-500 shadow-sm hover:shadow-md cursor-pointer transition-all flex flex-col justify-between group">
                                    <input type="file" className="hidden" accept=".json" onChange={handleImportJSONFile} />
                                    <div className="space-y-2">
                                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl w-fit group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                            <Icon name="upload" size={24} />
                                        </div>
                                        <h3 className="font-bold text-base sm:text-lg text-slate-800">导入 JSON</h3>
                                        <p className="text-[11px] sm:text-xs text-slate-400">载入以往通过本工具备份导出的 JSON 画画文件。</p>
                                    </div>
                                    <span className="text-indigo-600 font-semibold text-xs mt-4 inline-flex items-center gap-1 group-hover:translate-x-1 transition-transform">导入 JSON →</span>
                                </label>
                            </div>

                            {/* 本地文件夹自动保存设置 */}
                            <div className="bg-slate-100 p-4 rounded-2xl border flex flex-col sm:flex-row items-center justify-between gap-4 text-center sm:text-left mx-2">
                                <div className="space-y-1">
                                    <p className="text-sm font-semibold text-slate-800">💡 推荐：配置默认自动保存本地目录</p>
                                    <p className="text-[11px] sm:text-xs text-slate-400">配置后每次改动自动静默保存为 JSON，跨越整点自动归档为 CSV。</p>
                                </div>
                                {isLocalSaveSupported ? (
                                    dirHandle ? (
                                        <button onClick={requestFolderPermission} className="px-4 py-2 bg-slate-800 text-white hover:bg-slate-900 transition-colors text-xs font-bold rounded-xl flex items-center gap-1.5 shrink-0 min-h-[44px]">
                                            <Icon name="folderOpen" size={14} /> 已配置目录 (点击重新验证)
                                        </button>
                                    ) : (
                                        <button onClick={selectAutosaveDirectory} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white transition-colors text-xs font-bold rounded-xl flex items-center gap-1.5 shadow-sm shrink-0 min-h-[44px]">
                                            <Icon name="folder" size={14} /> 选择本地空文件夹
                                        </button>
                                    )
                                ) : (
                                    <span className="text-[11px] text-red-500 bg-red-50 border border-red-100 px-3 py-2 rounded-lg leading-relaxed">您的浏览器目前不支持文件夹直连读写（推荐使用 Chrome 或 Edge 浏览器）</span>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen w-screen overflow-hidden">
                    {/* 自适应 Header 工具栏 */}
                    <header className="h-14 bg-white border-b flex items-center justify-between px-2 md:px-4 z-10 shadow-sm shrink-0">
                        <div className="flex items-center gap-1 sm:gap-2 overflow-hidden">
                            <div className="bg-slate-800 p-1.5 rounded-lg text-white shadow-sm shrink-0"><Icon name="settings" size={18} /></div>
                            <h1 className="font-bold text-sm sm:text-base tracking-tight text-slate-800 shrink-0">{VERSION}</h1>
                            <div className="h-6 w-px bg-slate-200 mx-1 shrink-0" />
                            
                            {/* 撤销恢复 */}
                            <div className="flex items-center gap-0.5 shrink-0">
                                <button onClick={undo} disabled={historyIndex <= 0} className={`p-1.5 rounded-lg min-h-[40px] min-w-[40px] flex items-center justify-center ${historyIndex > 0 ? 'text-slate-600 hover:bg-slate-100' : 'text-slate-300'}`} title="撤销"><Icon name="undo" size={18} /></button>
                                <button onClick={redo} disabled={historyIndex >= history.length - 1} className={`p-1.5 rounded-lg min-h-[40px] min-w-[40px] flex items-center justify-center ${historyIndex < history.length - 1 ? 'text-slate-600 hover:bg-slate-100' : 'text-slate-300'}`} title="恢复"><Icon name="redo" size={18} /></button>
                            </div>

                            {/* 本地静默自动同步指示灯 */}
                            <div className="hidden lg:flex items-center shrink-0">
                                <div className="h-6 w-px bg-slate-200 mx-1" />
                                {isLocalSaveSupported && dirHandle ? (
                                    folderPermission === 'granted' ? (
                                        <div onClick={selectAutosaveDirectory} className="cursor-pointer flex items-center gap-1.5 px-3 py-1 bg-green-50 text-green-700 border border-green-200 rounded-lg text-xs font-medium" title="点击更换保存目录">
                                            <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping" />
                                            <span>同步已开启</span>
                                        </div>
                                    ) : (
                                        <div onClick={requestFolderPermission} className="cursor-pointer flex items-center gap-1.5 px-3 py-1 bg-orange-50 text-orange-700 border border-orange-200 rounded-lg text-xs font-medium animate-pulse" title="点击获取文件夹权限授权以继续同步">
                                            <span>⚠️ 同步待授权</span>
                                        </div>
                                    )
                                ) : (
                                    <div onClick={selectAutosaveDirectory} className={`cursor-pointer flex items-center gap-1.5 px-3 py-1 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-lg text-xs font-medium ${!isLocalSaveSupported ? 'pointer-events-none opacity-50' : ''}`} title="建立本地同步文件夹">
                                        <span>未开启同步</span>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* 右侧导出与选项 (移动端自动折叠或仅显示图标) */}
                        <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                            <button onClick={collapseAll} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 min-h-[40px]" title="一键收起"><Icon name="fold" size={18} /></button>
                            <button onClick={handleFitView} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 min-h-[40px]" title="重置视角"><Icon name="maximize" size={18} /></button>
                            <div className="h-6 w-px bg-slate-200 mx-0.5 sm:mx-1" />
                            
                            <button onClick={handleDownloadImage} className="flex items-center gap-1 px-1.5 sm:px-2.5 py-1.5 hover:bg-slate-100 rounded-lg text-xs sm:text-sm font-medium text-slate-700 transition-colors min-h-[40px]">
                                <Icon name="image" size={16} />
                                <span className="hidden md:inline">图片</span>
                            </button>
                            <button onClick={handleExportOPML} className="flex items-center gap-1 px-1.5 sm:px-2.5 py-1.5 hover:bg-slate-100 rounded-lg text-xs sm:text-sm font-medium text-slate-700 transition-colors min-h-[40px]">
                                <Icon name="share" size={16} />
                                <span className="hidden md:inline">OPML</span>
                            </button>
                            <button onClick={handleExportMarkdown} className="flex items-center gap-1 px-1.5 sm:px-2.5 py-1.5 hover:bg-slate-100 rounded-lg text-xs sm:text-sm font-medium text-slate-700 transition-colors min-h-[40px]">
                                <Icon name="fileText" size={16} />
                                <span className="hidden md:inline">MD</span>
                            </button>
                            <button onClick={handleExportJSON} className="flex items-center gap-1 px-1.5 sm:px-2.5 py-1.5 hover:bg-slate-100 rounded-lg text-xs sm:text-sm font-medium text-slate-700 transition-colors min-h-[40px]">
                                <Icon name="download" size={16} />
                                <span className="hidden md:inline">JSON</span>
                            </button>
                            
                            <div className="h-6 w-px bg-slate-200 mx-0.5 sm:mx-1" />
                            <button onClick={() => {
                                if(confirm('确定要关闭当前脑图并返回主页吗？未保存的数据如果未开启文件夹同步将会丢失。')) {
                                    setDataState(null);
                                    setHistory([]);
                                }
                            }} className="p-2 hover:bg-red-50 text-red-500 hover:text-red-700 rounded-lg transition-all min-h-[40px]" title="返回主页"><Icon name="close" size={18} /></button>
                        </div>
                    </header>

                    {/* 画布核心绘图主区 */}
                    <main className="flex-1 relative overflow-hidden bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] bg-[length:24px_24px]" 
                        onMouseDown={(e) => { 
                            if (e.target.tagName === 'svg') { 
                                setDragInfo({ isDragging: false, draggingId: null, dx: 0, dy: 0, targetId: null });
                                setSelectedId('root');
                                
                                const sx = e.clientX - translate.x, sy = e.clientY - translate.y; 
                                const mm = (ev) => setTranslate({ x: ev.clientX - sx, y: ev.clientY - sy }); 
                                const mu = () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); }; 
                                window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu); 
                            } 
                        }}
                        onTouchStart={handleTouchStart}
                        onWheel={(e) => setScale(s => Math.min(Math.max(s - e.deltaY * 0.001, 0.15), 3.0))}
                    >
                        
                        {/* 粘贴板及移动端复制挂载层 */}
                        {clipboard && (
                            <div className="absolute top-4 left-4 z-20 flex items-center gap-2 bg-blue-50 border border-blue-200 px-3 py-2 rounded-xl shadow-sm text-xs text-blue-600 animate-bounce max-w-[calc(100%-2rem)]">
                                <Icon name="copy" size={14} /> 
                                <span className="truncate">已复制节点: "{clipboard.text}"</span>
                            </div>
                        )}

                        <svg ref={svgRef} width="100%" height="100%">
                            <g transform={`translate(${translate.x}, ${translate.y}) scale(${scale})`}>
                                {renderTree(layout)}
                            </g>
                        </svg>
                        
                        {/* 手机/平板端专属悬浮触控板 (支持微调及重置) */}
                        <div className="absolute right-4 bottom-24 flex flex-col gap-2 z-20 md:hidden">
                            <button onClick={() => setScale(s => Math.min(s + 0.1, 3.0))} className="p-3.5 bg-white/90 backdrop-blur rounded-full shadow-lg border border-slate-200 text-slate-700 active:bg-slate-100 flex items-center justify-center min-h-[46px] min-w-[44px]" title="放大"><Icon name="plus" size={18} /></button>
                            <button onClick={() => setScale(s => Math.max(s - 0.1, 0.15))} className="p-3.5 bg-white/90 backdrop-blur rounded-full shadow-lg border border-slate-200 text-slate-700 active:bg-slate-100 flex items-center justify-center min-h-[46px] min-w-[44px]" title="缩小"><Icon name="minus" size={18} /></button>
                            <button onClick={handleFitView} className="p-3.5 bg-white/90 backdrop-blur rounded-full shadow-lg border border-slate-200 text-slate-700 active:bg-slate-100 flex items-center justify-center min-h-[46px] min-w-[44px]" title="居中"><Icon name="maximize" size={18} /></button>
                        </div>

                        {/* 自适应底部控制栏 */}
                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex flex-wrap justify-center gap-1.5 sm:gap-2 bg-white/90 backdrop-blur shadow-2xl border border-slate-200 p-2 rounded-2xl sm:rounded-3xl z-20 w-[92%] sm:w-auto max-w-full">
                            <button onClick={() => addChild(selectedId)} className="flex items-center gap-1 sm:gap-1.5 px-3 sm:px-4 py-2 bg-blue-600 text-white rounded-xl sm:rounded-2xl text-[11px] sm:text-xs font-bold shadow-lg hover:shadow-blue-200 transition-all active:scale-95 min-h-[40px]"><Icon name="plus" size={12} /> 子话题</button>
                            <button onClick={() => { if (selectedId === 'root') return; const pId = findParentId(data, selectedId); addChild(pId); }} className="flex items-center gap-1 sm:gap-1.5 px-3 sm:px-4 py-2 bg-slate-700 text-white rounded-xl sm:rounded-2xl text-[11px] sm:text-xs font-bold shadow-lg hover:shadow-slate-200 transition-all active:scale-95 min-h-[40px]"><Icon name="plus" size={12} /> 同级</button>
                            
                            <div className="w-px h-6 bg-slate-200 self-center hidden sm:block" />
                            
                            <button onClick={() => moveSibling(selectedId, -1)} className="p-2.5 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl shadow-sm transition-all min-h-[40px]" title="上移"><Icon name="up" size={12} /></button>
                            <button onClick={() => moveSibling(selectedId, 1)} className="p-2.5 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl shadow-sm transition-all min-h-[40px]" title="下移"><Icon name="down" size={12} /></button>
                            
                            {selectedId !== 'root' && findParentId(data, selectedId) === 'root' && (
                                <button onClick={() => changeBranchColor(selectedId)} className="flex items-center gap-1.5 px-3 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl sm:rounded-2xl text-[11px] sm:text-xs font-bold hover:bg-slate-50 transition-all active:scale-95 shadow-sm min-h-[40px]"><Icon name="palette" size={12} /> 换色</button>
                            )}

                            <div className="flex gap-1">
                                <button onClick={handleCopy} className={`flex items-center gap-1 px-3 py-2 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-xl sm:rounded-2xl text-[11px] sm:text-xs font-bold hover:bg-indigo-100 transition-all active:scale-95 shadow-sm min-h-[40px] ${selectedId === 'root' ? 'opacity-50 cursor-not-allowed' : ''}`} title="复制节点">
                                    <Icon name="copy" size={12} /> 复制
                                </button>
                                {clipboard && (
                                    <button onClick={handlePaste} className="flex items-center gap-1 px-3 py-2 bg-emerald-500 text-white rounded-xl sm:rounded-2xl text-[11px] sm:text-xs font-bold hover:bg-emerald-600 transition-all active:scale-95 shadow-lg animate-pulse min-h-[40px]" title="粘贴">
                                        <Icon name="paste" size={12} /> 粘贴
                                    </button>
                                )}
                            </div>
                            
                            <div className="w-px h-6 bg-slate-200 self-center hidden sm:block" />
                            <button onClick={() => { if (selectedId === 'root') return; const upd = (n) => ({ ...n, children: (n.children || []).filter(c => c.id !== selectedId).map(upd) }); setData(upd(data)); setSelectedId('root'); }} className="p-2.5 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-xl sm:rounded-2xl transition-colors min-h-[40px]"><Icon name="trash" size={14} /></button>
                        </div>

                        {/* 状态监控面板 */}
                        <div className="absolute top-16 right-4 pointer-events-none space-y-1 hidden sm:block">
                           <div className="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full border text-[10px] text-slate-500 shadow-sm flex items-center gap-2">
                              <div className={`w-2 h-2 rounded-full ${saveStatus === '修改已保存' ? 'bg-green-500' : 'bg-orange-500'}`} />
                              <span>内存状态: {saveStatus}</span>
                           </div>
                           {isLocalSaveSupported && dirHandle && (
                               <div className="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full border text-[10px] text-slate-500 shadow-sm flex items-center gap-2">
                                  <div className={`w-2 h-2 rounded-full ${folderPermission === 'granted' ? 'bg-blue-500' : 'bg-red-500'}`} />
                                  <span>本地同步: {folderSaveStatus}</span>
                               </div>
                           )}
                        </div>

                        {/* 移动/手势说明面板 */}
                        <div className="absolute top-16 left-4 pointer-events-none space-y-1 bg-white/40 p-2 rounded text-[10px] text-slate-500 shadow-sm max-w-[200px] hidden sm:block">
                           <p>• 撤销/恢复：Ctrl+Z / Ctrl+Y</p>
                           <p>• 手机捏合缩放 & 双指拖动</p>
                           <p>• 取消拖拽/悬浮：按 <b>Esc</b> 键或点击空白画布</p>
                           <p>• 自动同步：每分钟覆盖 ithought_autosave.json</p>
                           <p>• 每小时静默归档：ithought_autosave.csv 文件</p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); // 修正 React 挂载方式，恢复为 <App />
    </script>
</body>
</html>
