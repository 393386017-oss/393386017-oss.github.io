            const [toastMsg, setToastMsg] = useState(null);

            // 格式刷状态
            const [isFormatPainterActive, setIsFormatPainterActive] = useState(false);
            const [painterSourcePath, setPainterSourcePath] = useState(null); 
            
            const fileInputRef = useRef(null);
            const captureRef = useRef(null); 

            const levelNames = ['学科', '单元', '知识点', '考点'];

            // 掌握程度配置 (重构为直观的四类状态)
            const masteryOptions = [
                { id: 'gray', label: '完全不会', bg: 'bg-slate-400', ring: 'ring-slate-400', tag: '不会' },
                { id: 'orange', label: '掌握不熟', bg: 'bg-orange-500', ring: 'ring-orange-500', tag: '不熟' },
                { id: 'blue', label: '等待巩固', bg: 'bg-blue-400', ring: 'ring-blue-400', tag: '待固' },
                { id: 'green', label: '熟练掌握', bg: 'bg-emerald-500', ring: 'ring-emerald-500', tag: '熟练' }
            ];

            const getPathKey = (pathArr) => pathArr.join(' | ');

            const getActiveInfo = () => {
                const key = getPathKey(navPath);
                let title = '全局视野';
                let prefix = levelNames[viewLevel] || '明细';
                if (navPath.length > 0) {
                    title = navPath[navPath.length - 1];
                }
                return { key, title, prefix };
            };

            const activeInfo = getActiveInfo();

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 3000);
            };

            useEffect(() => {
                setCurrentNoteText(notes[activeInfo.key] || '');
                setCurrentMasteryColor(masteryColors[activeInfo.key] || 'default');
            }, [activeInfo.key, notes, masteryColors]);

            useEffect(() => {
                localStorage.setItem('edu_notes', JSON.stringify(notes));
                localStorage.setItem('edu_mastery', JSON.stringify(masteryColors));
                localStorage.setItem('edu_custom_names', JSON.stringify(customNames));
            }, [notes, masteryColors, customNames]);

            // --- 导航函数 ---
            const handleBreadcrumbClick = (levelIndex) => {
                setIsFormatPainterActive(false);
                setNavPath(navPath.slice(0, levelIndex));
                setViewLevel(levelIndex);
            };

            const handleNavigateUp = () => {
                if (viewLevel > 0) {
                    setIsFormatPainterActive(false);
                    setNavPath(navPath.slice(0, navPath.length - 1));
                    setViewLevel(viewLevel - 1);
                }
            };

            const handleNodeClick = (nodeName) => {
                setIsFormatPainterActive(false);
                const newPath = [...navPath, nodeName];
                setNavPath(newPath);
                setViewLevel(viewLevel + 1);
            };

            // --- 保存与操作 ---
            const handleSaveNote = () => {
                setNotes(prev => ({ ...prev, [activeInfo.key]: currentNoteText }));
                setMasteryColors(prev => ({ ...prev, [activeInfo.key]: currentMasteryColor }));
                showToast(`【${activeInfo.prefix}数据】已同步！`);
            };

            const handleSavePeriodName = () => {
                if (activeInfo.key) {
                    setCustomNames(prev => ({ ...prev, [activeInfo.key]: editNameText }));
                }
                setIsEditingName(false);
            };

            const handleMasterySelect = (colorId, tag) => {
                setCurrentMasteryColor(colorId);
                let txt = currentNoteText || '';
                const allTags = masteryOptions.map(c => `[${c.tag}]`);
                const tagRegex = new RegExp(`^(\\[(${masteryOptions.map(c=>c.tag).join('|')})\\])\\s*`);
                
                if (!txt.trim()) {
                    setCurrentNoteText(`[${tag}] `);
                } else if (tagRegex.test(txt)) {
                    setCurrentNoteText(txt.replace(tagRegex, `[${tag}] `));
                } else {
                    setCurrentNoteText(`[${tag}] ${txt}`);
                }
            };

            // --- 导出功能 ---
            const getExportFileName = (ext) => {
                const date = new Date();
                const yy = String(date.getFullYear()).slice(-2);
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                return `扬州五年级下册学情-${yy}${mm}${dd}.${ext}`;
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            // 递归提取整棵树及用户数据
            const extractDataTree = () => {
                const createNode = (pathArr) => {
                    const key = getPathKey(pathArr);
                    return {
                        title: pathArr[pathArr.length-1] || '五年级下册知识树',
                        levelName: levelNames[pathArr.length-1] || '根节点',
                        name: customNames[key] || '',
                        note: notes[key] || '',
                        mastery: masteryColors[key] || 'default',
                        children: []
                    };
                };

                const root = createNode([]);
                Object.keys(syllabusData).forEach(subject => {
                    const sPath = [subject];
                    const sNode = createNode(sPath);
                    Object.keys(syllabusData[subject]).forEach(unit => {
                        const uPath = [...sPath, unit];
                        const uNode = createNode(uPath);
                        Object.keys(syllabusData[subject][unit]).forEach(kp => {
                            const kPath = [...uPath, kp];
                            const kNode = createNode(kPath);
                            syllabusData[subject][unit][kp].forEach(tp => {
                                const tPath = [...kPath, tp];
                                kNode.children.push(createNode(tPath));
                            });
                            uNode.children.push(kNode);
                        });
                        sNode.children.push(uNode);
                    });
                    root.children.push(sNode);
                });
                return root;
            };

            const handleExportCSV = () => {
                const tree = extractDataTree();
                const escapeCSV = (str) => `"${String(str || '').replace(/"/g, '""')}"`;
                
                const flattenWideTable = (node, path = {}, result = []) => {
                    let masteryText = '';
                    if (node.mastery !== 'default') {
                        const mObj = masteryOptions.find(o => o.id === node.mastery);
                        if (mObj) masteryText = mObj.tag;
                    }
                    path[node.levelName] = { title: node.title, name: node.name, note: node.note, mastery: masteryText };
                    
                    if (node.children.length === 0) {
                        result.push({ ...path });
                    } else {
                        node.children.forEach(c => flattenWideTable(c, { ...path }, result));
                    }
                    return result;
                };
                
                const rawRows = flattenWideTable(tree);
                let csvContent = '\uFEFF'; 
                const headers = ['学科', '单元', '知识点', '考点'];
                
                // 表头
                csvContent += headers.map(h => `${h}名称,${h}自定义命名,${h}掌握度,${h}笔记`).join(',') + '\n';
                
                rawRows.forEach(row => {
                    const csvRow = headers.map(h => {
                        const data = row[h] || { title:'', name:'', note:'', mastery:'' };
                        return `${escapeCSV(data.title)},${escapeCSV(data.name)},${escapeCSV(data.mastery)},${escapeCSV(data.note)}`;
                    });
                    csvContent += csvRow.join(',') + '\n';
                });
                
                downloadFile(csvContent, getExportFileName('csv'), 'text/csv;charset=utf-8;');
                showToast("全息学情宽表(.csv)导出成功！");
            };

            const handleExportMindMap = () => {
                const tree = extractDataTree();
                const escapeXML = (unsafe) => (unsafe || '').replace(/[<>&'"]/g, c => {
                    switch (c) { case '<': return '&lt;'; case '>': return '&gt;'; case '&': return '&amp;'; case '\'': return '&apos;'; case '"': return '&quot;'; default: return c; }
                });

                const buildOPMLNode = (node) => {
                    let displayTitle = node.title;
                    if (node.name) displayTitle += `【${node.name}】`;
                    if (node.mastery !== 'default') {
                         const mObj = masteryOptions.find(o => o.id === node.mastery);
                         if(mObj) displayTitle = `[${mObj.tag}] ` + displayTitle;
                    }
                    let xml = `\n<outline text="${escapeXML(displayTitle)}" _note="${escapeXML(node.note)}">`;
                    if(node.note) xml += `\n  <outline text="${escapeXML('📝 ' + node.note.replace(/\n/g, ' '))}" />`; 
                    node.children.forEach(c => { xml += buildOPMLNode(c); });
                    xml += `\n</outline>`;
                    return xml;
                };

                const opmlContent = `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="1.0">\n  <head>\n    <title>扬州五年级下册学情图谱</title>\n  </head>\n  <body>${buildOPMLNode(tree)}\n  </body>\n</opml>`;
                downloadFile(opmlContent, getExportFileName('opml'), 'text/xml;charset=utf-8;');
                showToast("学情思维导图(.opml)导出成功！");
            };

            const handleExportData = () => {
                const exportObj = { notes, masteryColors, customNames };
                const dataStr = JSON.stringify(exportObj, null, 2);
                downloadFile(dataStr, getExportFileName('json'), 'application/json');
                showToast("数据备份文件导出成功！");
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.notes) setNotes(importedData.notes);
                        if (importedData.masteryColors) setMasteryColors(importedData.masteryColors); 
                        if (importedData.customNames) setCustomNames(importedData.customNames);
                        showToast('学情数据恢复成功！');
                    } catch (error) { showToast('导入失败：文件格式错误。'); }
                    if (fileInputRef.current) fileInputRef.current.value = '';
                };
                reader.readAsText(file);
            };

            const handleExportImage = () => {
                if (!captureRef.current) return;
                showToast("正在生成高清长图，请稍候...");
                html2canvas(captureRef.current, { scale: 2, useCORS: true, backgroundColor: '#f8fafc' }).then(canvas => {
                    let link = document.createElement('a');
                    link.download = getExportFileName('PNG');
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast("长图已保存！");
                });
            };

            // --- 视图渲染器 ---
            
            // 0: 渲染学科
            const renderSubjects = () => {
                const subjects = Object.keys(syllabusData);
                return (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-6 h-full p-1 md:p-2 overflow-y-auto no-scrollbar pb-4">
                        {subjects.map((sub, idx) => {
                            const key = getPathKey([sub]);
                            const cName = customNames[key] ? `【${customNames[key]}】` : '';
                            const bgColors = ['bg-blue-50', 'bg-emerald-50', 'bg-orange-50'];
                            const textColors = ['text-blue-600', 'text-emerald-600', 'text-orange-600'];
                            const borderColors = ['hover:border-blue-300', 'hover:border-emerald-300', 'hover:border-orange-300'];
                            return (
                                <div key={sub} onClick={() => handleNodeClick(sub)} 
                                     className={`p-4 md:p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-row md:flex-col cursor-pointer transition-all group ${bgColors[idx%3]} ${borderColors[idx%3]} hover:shadow-md min-h-[90px] md:h-80 items-center`}>
                                    <div className="flex-shrink-0 mr-4 md:mr-0 md:flex-grow md:flex md:flex-col md:items-center md:justify-center">
                                        <BookOpen className={`w-10 h-10 md:w-16 md:h-16 ${textColors[idx%3]} md:mb-4 opacity-80 group-hover:scale-110 transition-transform`} />
                                    </div>
                                    <div className="flex-grow flex flex-col justify-center text-left md:text-center">
                                        <h3 className={`text-xl md:text-3xl font-black ${textColors[idx%3]} mb-0.5 md:mb-2`}>{sub}</h3>
                                        <p className="text-slate-500 text-xs md:text-sm font-medium">{cName || '扬州地区考纲'}</p>
                                    </div>
                                    <div className="flex-shrink-0 ml-auto md:ml-0 md:w-full md:pt-4 md:border-t border-slate-200/50 flex justify-end md:justify-between items-center">
                                        <span className="hidden md:inline text-xs font-bold text-slate-400">点击进入单元</span>
                                        <ChevronRight className={`w-5 h-5 md:w-5 md:h-5 ${textColors[idx%3]}`} />
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                );
            };

            // 1: 渲染单元
            const renderUnits = () => {
                const subject = navPath[0];
                const units = Object.keys(syllabusData[subject]);
                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 h-full overflow-y-auto no-scrollbar pb-4">
                        {units.map((unit) => {
                            const pathArr = [subject, unit];
                            const key = getPathKey(pathArr);
                            const cName = customNames[key] ? `【${customNames[key]}】` : '';
                            const note = notes[key];
                            return (
                                <div key={unit} onClick={() => handleNodeClick(unit)} 
                                     className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col cursor-pointer hover:border-blue-300 hover:shadow-md transition-all group">
                                    <h4 className="font-extrabold text-slate-800 mb-3 flex items-center justify-between text-lg">
                                        <span>{unit} <span className="text-blue-500 font-normal text-sm">{cName}</span></span>
                                        <ChevronRight className="w-5 h-5 text-slate-300 group-hover:text-blue-500 transition-colors" />
                                    </h4>
                                    <div className="text-sm text-slate-600 whitespace-pre-wrap flex-grow bg-slate-50 p-3 rounded-xl border border-slate-100 min-h-[80px]">
                                        {note ? note : <span className="opacity-40 italic flex items-center gap-1"><EditIcon className="w-3 h-3"/> 点击右侧记录单元宏观规划...</span>}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                );
            };

            // 2: 渲染知识点
            const renderKnowledgePoints = () => {
                const [subject, unit] = navPath;
                const kps = Object.keys(syllabusData[subject][unit]);
                return (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 h-full overflow-y-auto no-scrollbar pb-4">
                        {kps.map((kp) => {
                            const pathArr = [subject, unit, kp];
                            const key = getPathKey(pathArr);
                            const cName = customNames[key] ? `【${customNames[key]}】` : '';
                            const note = notes[key];
                            return (
                                <div key={kp} onClick={() => handleNodeClick(kp)} 
                                     className="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col cursor-pointer hover:border-emerald-300 hover:shadow-md transition-all group">
                                    <h4 className="font-extrabold text-emerald-700 mb-3 flex items-center justify-between">
                                        <span>{kp} <span className="text-slate-500 font-normal text-xs">{cName}</span></span>
                                        <TargetIcon className="w-4 h-4 text-emerald-300 group-hover:text-emerald-600" />
                                    </h4>
                                    <div className="text-xs md:text-sm text-slate-600 whitespace-pre-wrap flex-grow bg-emerald-50/50 p-3 rounded-xl border border-emerald-100 min-h-[80px]">
                                        {note ? note : <span className="opacity-40 italic flex items-center gap-1"><EditIcon className="w-3 h-3"/> 核心知识点批注...</span>}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                );
            };

            // 3: 渲染考点 (原日视图时段矩阵)
            const renderTestPoints = () => {
                const [subject, unit, kp] = navPath;
                const testPoints = syllabusData[subject][unit][kp];

                const handlePointClick = (tp, key) => {
                    if (isFormatPainterActive) {
                        if (!painterSourcePath) {
                            setPainterSourcePath(key);
                            showToast(`已复制考点 "${tp}" 的掌握状态，点击其他考点即可粘贴。`);
                        } else {
                            // 粘贴
                            const srcColor = masteryColors[painterSourcePath] || 'default';
                            const srcNote = notes[painterSourcePath] || '';
                            setMasteryColors(prev => ({ ...prev, [key]: srcColor }));
                            setNotes(prev => ({ ...prev, [key]: srcNote }));
                        }
                    } else {
                        // 进入第4层(选中状态在右侧显示)
                        handleNodeClick(tp);
                    }
                };

                return (
                    <div className="flex flex-col h-full justify-start pb-4">
                        <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm w-full relative">
                            
                            {/* 格式刷操作栏 */}
                            <div className="flex items-center justify-between mb-4 md:mb-6 border-b border-slate-100 pb-4">
                                <div className="text-sm md:text-base font-bold text-slate-700 flex items-center gap-2">
                                    <LayoutGrid className="w-4 h-4 md:w-5 md:h-5 text-blue-500"/> 考点学情追踪矩阵
                                </div>
                                <div className="flex items-center gap-3">
                                    {isFormatPainterActive && (
                                        <span className="text-xs font-semibold text-blue-500 animate-pulse flex items-center gap-1 bg-blue-50 px-2 py-1 rounded-full border border-blue-100">
                                            <div className="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                                            {painterSourcePath ? '请点击目标进行粘贴' : '请点击源考点进行复制'}
                                        </span>
                                    )}
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            setIsFormatPainterActive(!isFormatPainterActive);
                                            setPainterSourcePath(null);
                                        }}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all border ${isFormatPainterActive ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100 border-slate-200 shadow-sm'}`}
                                        title="开启/关闭批量复制格式刷"
                                    >
                                        <PaintbrushIcon className="w-4 h-4"/>
                                        {isFormatPainterActive ? '关闭刷子' : '学情格式刷'}
                                    </button>
                                </div>
                            </div>

                            {/* 优化后的高密度网格布局，适配短词汇与拼音 */}
                            <div className={`grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 md:gap-3 ${isFormatPainterActive && painterSourcePath ? 'cursor-crosshair' : ''}`}>
                                {testPoints.map((tp, idx) => {
                                    const pathArr = [...navPath, tp];
                                    const key = getPathKey(pathArr);
                                    const colorId = masteryColors[key] || 'default';
                                    const noteText = notes[key] || '';
                                    
                                    let bgClass = 'bg-slate-50 hover:bg-slate-100 border-slate-200 text-slate-600';
                                    let tagText = '未评';
                                    
                                    if (colorId !== 'default') {
                                        const colorObj = masteryOptions.find(c => c.id === colorId);
                                        if (colorObj) {
                                            bgClass = `${colorObj.bg} text-white border-transparent shadow-md`;
                                            tagText = colorObj.tag;
                                        }
                                    } else if (noteText) {
                                        bgClass = 'bg-slate-200 text-slate-800 border-transparent';
                                    }

                                    const isSource = isFormatPainterActive && painterSourcePath === key;
                                    const sourceRingClass = isSource ? 'ring-4 ring-offset-2 ring-blue-500 z-10 scale-105 shadow-xl' : '';
                                    const displayNote = noteText ? noteText.replace(/\n/g, ' ').substring(0, 10) + (noteText.length > 10 ? '...' : '') : '';

                                    return (
                                        <div key={idx} 
                                             onClick={(e) => { e.stopPropagation(); handlePointClick(tp, key); }}
                                             className={`flex flex-col justify-between rounded-xl border-2 transition-all hover:scale-[1.05] cursor-pointer overflow-hidden min-h-[60px] p-2 md:p-3 ${bgClass} ${sourceRingClass}`}>
                                            <div className="flex flex-col justify-between items-start gap-1 mb-1">
                                                <span className="text-xs md:text-sm font-bold leading-tight break-all">{tp}</span>
                                                <span className={`text-[9px] px-1.5 py-0.5 rounded-full font-black tracking-widest shrink-0 self-end ${colorId !== 'default' ? 'bg-white/20 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                                    {tagText}
                                                </span>
                                            </div>
                                            {displayNote && <span className="text-[10px] font-medium opacity-80 truncate w-full">{displayNote}</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            // 4: 渲染具体考点视图 (原单时段大字视图)
            const renderTestPointDetail = () => {
                const tpName = navPath[3];
                return (
                    <div className="flex flex-col items-center justify-center h-full p-6 text-center">
                        <div className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-700 to-indigo-900 leading-tight drop-shadow-sm mb-6 max-w-2xl">
                            {tpName}
                        </div>
                        <div className="text-lg md:text-xl font-extrabold text-blue-600 bg-blue-50 px-6 py-3 rounded-2xl border border-blue-100 shadow-sm flex items-center gap-2">
                            <TargetIcon className="w-6 h-6"/> 考点突破中
                        </div>
                        <p className="mt-8 text-slate-500 font-medium text-sm flex items-center gap-1.5 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                            <Info className="w-4 h-4 text-blue-500"/> 请在右侧面板标记您的掌握程度并录入核心笔记
                        </p>
                    </div>
                )
            };

            const renderCurrentView = () => {
                switch(viewLevel) {
                    case 0: return renderSubjects();
                    case 1: return renderUnits();
                    case 2: return renderKnowledgePoints();
                    case 3: return renderTestPoints();
                    case 4: return renderTestPointDetail();
                    default: return renderSubjects();
                }
            };

            const currentCustomName = customNames[activeInfo.key] || '';

            return (
                <div className="w-full h-full max-w-[1400px] max-h-[850px] aspect-auto md:aspect-video flex flex-col font-sans relative">
                    
                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 text-sm font-bold tracking-wide animate-[bounce_1s_infinite]">
                            {toastMsg}
                        </div>
                    )}

                    {/* 顶部控制台 */}
                    <div className="mb-4 flex flex-col sm:flex-row items-center justify-between gap-3 shrink-0 px-2 md:px-0">
                        <div className="flex items-center">
                            <h1 className="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-emerald-600 tracking-tight flex items-center drop-shadow-sm">
                                Edu助力萌学
                                <span className="text-[10px] md:text-xs font-bold text-white bg-gradient-to-r from-blue-500 to-emerald-500 px-2 py-0.5 rounded-full ml-2 shadow-md">
                                    v2.0
                                </span>
                            </h1>
                        </div>
                        
                        {/* 动态面包屑导航 (替代之前的五级视图切换) */}
                        <div className="flex bg-white rounded-xl md:rounded-full p-1 shadow-sm border border-slate-200 flex-wrap justify-center items-center">
                            <button onClick={() => handleBreadcrumbClick(0)} className={`px-3 py-1.5 text-xs md:text-sm font-bold rounded-full transition-all duration-300 ${viewLevel === 0 ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>
                                核心大纲
                            </button>
                            {navPath.map((node, idx) => (
                                <React.Fragment key={idx}>
                                    <ChevronRight className="w-4 h-4 text-slate-300"/>
                                    <button onClick={() => handleBreadcrumbClick(idx + 1)} className={`px-3 py-1.5 text-xs md:text-sm font-bold rounded-full transition-all duration-300 truncate max-w-[100px] md:max-w-[150px] ${viewLevel === idx + 1 ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`} title={node}>
                                        {node}
                                    </button>
                                </React.Fragment>
                            ))}
                        </div>
                    </div>

                    {/* 主面板容器 */}
                    <div ref={captureRef} className="flex-grow bg-white rounded-2xl md:rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row relative border border-slate-100/50">
                        
                        {/* 左侧：内容展示区 */}
                        <div className="w-full md:w-[68%] p-4 md:p-6 border-b md:border-b-0 md:border-r border-slate-100 bg-slate-50/40 flex flex-col h-full overflow-hidden relative">
                            
                            {/* 返回上一级按钮 */}
                            {viewLevel > 0 && (
                                <button onClick={handleNavigateUp} className="absolute top-6 left-6 z-10 flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-blue-600 bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                                    <ChevronLeft className="w-4 h-4"/> 返回上一级
                                </button>
                            )}

                            <div className={`flex items-center justify-between mb-4 md:mb-6 shrink-0 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-slate-100/80 ${viewLevel > 0 ? 'mt-14 md:mt-0 md:ml-32' : ''}`}>
                                <div className="flex items-center gap-3">
                                    <BookOpen className="w-6 h-6 text-blue-600 flex-shrink-0" />
                                    {isEditingName ? (
                                        <div className="flex items-center gap-2">
                                            <input type="text" autoFocus value={editNameText} onChange={(e) => setEditNameText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSavePeriodName()} placeholder="自定义副标题..." className="px-3 py-1 text-sm md:text-base font-bold border-2 border-blue-400 rounded-lg outline-none w-32 md:w-64 text-blue-700 bg-blue-50" />
                                            <button onClick={handleSavePeriodName} className="text-sm bg-blue-600 text-white px-3 py-1 rounded-lg font-bold shadow-sm hover:bg-blue-700">确定</button>
                                        </div>
                                    ) : (
                                        <h2 className="text-lg md:text-xl font-black text-slate-800 flex items-center flex-wrap gap-1 tracking-tight">
                                            {activeInfo.title}
                                            {currentCustomName && ( <span className="text-blue-600 text-base">【{currentCustomName}】</span> )}
                                            <button onClick={() => { setEditNameText(currentCustomName || ''); setIsEditingName(true); }} className="ml-2 p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="添加自定义批注/时间">
                                                <EditIcon className="w-4 h-4" />
                                            </button>
                                        </h2>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex-grow overflow-hidden">{renderCurrentView()}</div>
                        </div>

                        {/* 右侧：绑定输入与高级操作 */}
                        <div className="w-full md:w-[32%] bg-white p-4 md:p-6 flex flex-col h-full overflow-y-auto no-scrollbar relative z-10">
                            <div className="mb-4 shrink-0">
                                <h3 className="text-xs font-bold text-blue-500 uppercase tracking-widest mb-1.5 flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> 当前聚焦：{activeInfo.prefix}
                                </h3>
                                <p className="text-lg md:text-xl font-black text-slate-800 border-b border-slate-100 pb-3 leading-snug"> {activeInfo.title} </p>
                            </div>

                            {/* 考点层级特有的学情掌握度评估 */}
                            {viewLevel >= 3 && (
                                <div className="mb-4 shrink-0 flex flex-col bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <span className="text-xs font-bold text-slate-500 mb-2">学情掌握评估</span>
                                    <div className="flex flex-wrap gap-2">
                                        {masteryOptions.map(c => (
                                            <button key={c.id} onClick={() => handleMasterySelect(c.id, c.tag)} title={c.label}
                                                className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${c.bg} text-white shadow-sm ${currentMasteryColor === c.id ? `ring-2 ring-offset-2 ${c.ring} scale-105` : 'opacity-60 hover:opacity-100'}`}
                                            >
                                                {c.tag}
                                            </button>
                                        ))}
                                        {/* 清除评估 */}
                                        <button onClick={() => setCurrentMasteryColor('default')} title="重置评估"
                                            className={`px-3 py-1.5 rounded-xl text-xs font-bold border-2 border-dashed border-slate-300 text-slate-400 hover:border-slate-500 hover:text-slate-600 transition-all ${currentMasteryColor === 'default' ? 'bg-slate-200 border-transparent text-slate-600' : 'bg-transparent'}`}
                                        >
                                            重置
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="flex-grow flex flex-col min-h-[150px]">
                                <label className="text-xs md:text-sm font-bold text-slate-600 mb-2 flex items-center gap-1.5">📝 易错记录与扩展笔记</label>
                                <textarea value={currentNoteText} onChange={(e) => setCurrentNoteText(e.target.value)} placeholder={`在此处记录关于 ${activeInfo.title} 的典型例题、易错点或心得...`} className="flex-grow w-full resize-none rounded-2xl border-2 border-slate-100 p-3 md:p-4 text-sm md:text-base focus:ring-0 focus:border-blue-400 outline-none bg-white text-slate-700 transition-all leading-relaxed shadow-inner"></textarea>
                            </div>

                            {/* 操作中心 */}
                            <div className="mt-4 pt-4 border-t border-slate-100 space-y-3 shrink-0">
                                <button onClick={handleSaveNote} className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-2.5 md:py-3 px-4 rounded-xl hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg shadow-blue-500/30 text-sm md:text-base active:scale-[0.98]">
                                    <Save className="w-4 h-4 md:w-5 md:h-5" /> <span>同步学情数据</span>
                                </button>
                                
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={handleExportImage} className="flex items-center justify-center gap-1.5 bg-indigo-50 text-indigo-600 font-bold py-2 rounded-xl hover:bg-indigo-100 transition-all border border-indigo-100 text-[11px] md:text-xs">
                                        <ImageIcon className="w-3.5 h-3.5" /> 导出长图
                                    </button>
                                    <button onClick={handleExportMindMap} className="flex items-center justify-center gap-1.5 bg-emerald-50 text-emerald-600 font-bold py-2 rounded-xl hover:bg-emerald-100 transition-all border border-emerald-100 text-[11px] md:text-xs">
                                        <MindMapIcon className="w-3.5 h-3.5" /> 导思维导图
                                    </button>
                                    <button onClick={handleExportCSV} className="flex items-center justify-center gap-1.5 bg-orange-50 text-orange-600 font-bold py-2 rounded-xl hover:bg-orange-100 transition-all border border-orange-100 text-[11px] md:text-xs">
                                        <TableIcon className="w-3.5 h-3.5" /> 导数据表
                                    </button>
                                    <div className="flex gap-1">
                                        <button onClick={handleExportData} className="flex-1 flex items-center justify-center bg-slate-50 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-100 transition-colors text-[10px] font-bold"> 备份配置 </button>
                                        <button onClick={() => fileInputRef.current?.click()} className="flex-1 flex items-center justify-center bg-slate-50 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-100 transition-colors text-[10px] font-bold"> 恢复数据 </button>
                                    </div>
                                </div>
                                <input type="file" accept=".json,.js" ref={fileInputRef} onChange={handleImportData} className="hidden" />
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
